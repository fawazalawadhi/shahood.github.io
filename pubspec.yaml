name: shahooda
description: "منصة شهودة لصناعة دعوات المناسبات (زفاف، خطوبة، مواليد) عبر قوالب جاهزة قابلة للتخصيص."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # الاتصال بقاعدة البيانات وخدمة تسجيل الدخول (Supabase)
  supabase_flutter: ^2.6.0

  # إدارة الحالة - يستخدم لبث تغييرات التصميم فوراً لشاشة المعاينة الحية
  provider: ^6.1.2

  # توليد معرفات فريدة للقوالب والدعوات
  uuid: ^4.4.0

  # اختيار الصور والفيديوهات من جهاز المستخدم
  image_picker: ^1.1.2

  # تشغيل الفيديو في شاشة المعاينة وفي الدعوة النهائية بعد الضغط على الغلاف
  video_player: ^2.9.1

  # عرض الصور من الشبكة (روابط الأصول المستضافة) مع كاش
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.1

  # اختيار الألوان يدوياً في لوحة تحكم الأدمن (تلوين تدرجات مخصصة)
  flutter_colorpicker: ^1.1.0

  # قراءة/كتابة بيانات محلياً مؤقتاً (قبل ربط Firebase) لحفظ القوالب والمسودات
  shared_preferences: ^2.2.3

  # تنسيق التاريخ/الوقت بالعربي في قسم "التاريخ والوقت" والعداد التنازلي
  intl: ^0.19.0

  # خطوط عربية متعددة يختار منها المستخدم لكل دور (أسماء/عناوين/نصوص)
  google_fonts: ^6.2.1

  # اختيار ملف صوتي (موسيقى خلفية) من جهاز المستخدم
  file_picker: ^8.0.0+1

  # تشغيل الموسيقى الخلفية بعد الكشف
  audioplayers: ^6.0.0

  # -- ملاحظة: تم الربط بـ Supabase (وليس Firebase) عبر حزمة supabase_flutter أعلاه

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/audio/
  # ملاحظة: لم نعد نحتاج لتحميل ملفات خط يدوياً - google_fonts يحمّل
  # الخطوط العربية المطلوبة تلقائياً عند أول استخدام (انظر lib/theme/app_fonts.dart)
